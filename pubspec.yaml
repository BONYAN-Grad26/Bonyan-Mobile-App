name: bonyaan_app
description: "Bonyaan AI Health and Fitness Mobile App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  flutter_secure_storage: ^9.2.4
  provider: ^6.1.5+1
  shared_preferences: ^2.5.3
  google_fonts: ^6.3.2
  image_picker: ^1.2.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Added automatically to handle native icon building seamlessly
  flutter_launcher_icons: ^0.13.1

# Configuration for native launcher icons generator
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  # Registered assets explicitly so they map directly into code namespaces
  assets:
    - assets/images/logo_stacked_light.png
    - assets/images/logo_stacked_dark.png
    - assets/images/app_icon.png